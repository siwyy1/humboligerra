name: cd

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-24.04

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::380875917731:role/github-actions
          aws-region: eu-central-1

      - name: Upload Glue Script
        run: |
          aws s3 cp \
          ingestion/crypto_ingestion1.py \
          s3://siwy-humboligerra/scripts/crypto_ingestion1.py